<!doctype html>
<html>
  <head>
    <title>Auth Test</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
      }
      input {
        display: block;
        width: 100%;
        padding: 8px;
        margin: 8px 0;
        box-sizing: border-box;
      }
      button {
        padding: 10px 20px;
        margin: 8px 0;
        cursor: pointer;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 4px;
      }
      pre {
        background: #f4f4f4;
        padding: 10px;
        border-radius: 4px;
        white-space: pre-wrap;
      }
      h2 {
        border-bottom: 1px solid #ddd;
        padding-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <h2>注册</h2>
    <input id="reg-username" placeholder="Username" />
    <input id="reg-email" placeholder="Email" />
    <input id="reg-password" placeholder="Password" type="password" />
    <button onclick="register()">注册</button>

    <h2>登录</h2>
    <input id="login-email" placeholder="Email" />
    <input id="login-password" placeholder="Password" type="password" />
    <button onclick="login()">登录</button>

    <h2>验证登录状态</h2>
    <button onclick="checkAuth()">Check Auth</button>

    <h2>结果</h2>
    <pre id="result">等待操作...</pre>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCdwvqYg-VIjrC8KUVTWDFcB7ASa3suCBs",
        authDomain: "artsy-dublin.firebaseapp.com",
        projectId: "artsy-dublin",
        storageBucket: "artsy-dublin.firebasestorage.app",
        messagingSenderId: "624729804094",
        appId: "1:624729804094:web:a7d91d57c5247b3b5af06f",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      window.register = async () => {
        try {
          const userName = document.getElementById("reg-username").value;
          const email = document.getElementById("reg-email").value;
          const password = document.getElementById("reg-password").value;

          const userCredential = await createUserWithEmailAndPassword(
            auth,
            email,
            password,
          );
          const firebaseUid = userCredential.user.uid;

          const res = await fetch("http://localhost:3005/users/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userName, email, firebaseUid }),
          });
          const data = await res.json();
          document.getElementById("result").innerText =
            "注册成功！\n" + JSON.stringify(data, null, 2);
        } catch (err) {
          document.getElementById("result").innerText =
            "注册失败：" + err.message;
        }
      };

      window.login = async () => {
        try {
          const email = document.getElementById("login-email").value;
          const password = document.getElementById("login-password").value;

          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password,
          );
          const token = await userCredential.user.getIdToken();
          localStorage.setItem("token", token);
          document.getElementById("result").innerText =
            "登录成功！token 已保存";
        } catch (err) {
          document.getElementById("result").innerText =
            "登录失败：" + err.message;
        }
      };

      window.checkAuth = async () => {
        try {
          const token = localStorage.getItem("token");
          if (!token) {
            document.getElementById("result").innerText =
              "没有找到 token，请先登录";
            return;
          }
          const res = await fetch("http://localhost:3005/api/check-auth", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          document.getElementById("result").innerText = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (err) {
          document.getElementById("result").innerText =
            "验证失败：" + err.message;
        }
      };
    </script>
  </body>
</html>
