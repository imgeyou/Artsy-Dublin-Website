<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Artsy Dublin Events</title>
    <style>
      .event-card {
        border: 1px solid #ddd;
        padding: 15px;
        margin: 10px 0;
        border-radius: 8px;
      }
      .btn {
        background: #007bff;
        color: white;
        padding: 8px 15px;
        text-decoration: none;
        border-radius: 4px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h1>Theatre Events in Dublin 🎭</h1>
    <div id="event-list">Loading events...</div>

    <script>
      async function loadEvents() {
        try {
          const response = await fetch(
            "http://localhost:3000/api/theatre-events",
          );
          const events = await response.json();

          const list = document.getElementById("event-list");
          list.innerHTML = "";

          events.forEach((event) => {
            const card = document.createElement("div");
            card.className = "event-card";
            card.innerHTML = `
                        <h3>${event.name}</h3>
                        <p>📍 ${event.venue} | 📅 ${event.date}</p>
                        <a href="${event.url}" target="_blank" class="btn">Book Tickets</a>
                    `;
            list.appendChild(card);
          });
        } catch (error) {
          document.getElementById("event-list").innerText =
            "Failed to load data.";
        }
      }
      loadEvents();
    </script>
  </body>
</html>
